<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0E0E0D">
<meta name="mobile-web-app-capable" content="yes">
<title>Finanças</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%230E0E0D' width='100' height='100' rx='20'/><text x='50' y='68' font-size='55' text-anchor='middle' fill='%234ADE80'>💰</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0E0E0D;--s1:#161615;--s2:#1D1D1C;--s3:#252524;
  --b1:#2A2A28;--b2:#3A3A38;
  --t1:#EEEEE9;--t2:#A0A098;--t3:#70706A;
  --g:#4ADE80;--gd:#142e1d;--r:#F87171;--rd:#2d1516;--o:#FBBF24;--od:#2d2410;
  --font:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;--rad:8px;
}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--t1);min-height:100dvh;-webkit-font-smoothing:antialiased}
button{font-family:var(--font);cursor:pointer}
input,select,textarea{font-family:var(--font)}
.app{max-width:560px;margin:0 auto;padding:16px 16px 100px}

/* header */
.hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 0 16px}
.hdr h1{font-family:var(--mono);font-size:1.05rem;font-weight:700;letter-spacing:-.3px}
.hdr-sub{font-family:var(--mono);font-size:.64rem;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.hdr-r{display:flex;gap:5px}
.btn-s{height:32px;padding:0 10px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);color:var(--t2);font-size:.7rem;font-weight:600;display:flex;align-items:center;gap:4px;transition:all .12s;cursor:pointer}
.btn-s:hover{border-color:var(--t3);color:var(--t1)}
.btn-g{background:var(--g);color:#111;border-color:var(--g)}.btn-g:hover{opacity:.85;border-color:var(--g)}

/* tabs */
.tabs{display:flex;gap:2px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:3px;margin-bottom:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:7px 10px;border:none;background:0;border-radius:6px;font-family:var(--mono);font-weight:600;font-size:.68rem;color:var(--t2);transition:all .12s;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;cursor:pointer}
.tab.on{background:var(--s2);color:var(--t1)}

/* section label */
.slbl{font-family:var(--mono);font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:8px;display:flex;align-items:center;gap:6px}

/* cards */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:14px;margin-bottom:8px}

/* stats grid */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:12px}
.stat-val{font-family:var(--mono);font-size:1.05rem;font-weight:700}
.stat-lbl{font-family:var(--mono);font-size:.6rem;color:var(--t3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* transaction item */
.tx-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px;cursor:pointer;transition:all .12s}
.tx-item:hover{border-color:var(--b2);background:var(--s2)}
.tx-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-family:var(--mono);font-size:.62rem;color:var(--t2);margin-top:2px;display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.tx-amount{font-family:var(--mono);font-size:.88rem;font-weight:700;white-space:nowrap}
.tx-amount.neg{color:var(--r)}
.tx-amount.pos{color:var(--g)}

/* badges */
.need-badge{font-family:var(--mono);font-size:.48rem;padding:1px 4px;border-radius:3px;font-weight:600}
.need-no{background:var(--rd);color:var(--r)}
.action-badge{font-family:var(--mono);font-size:.48rem;padding:1px 4px;border-radius:3px;background:var(--od);color:var(--o);font-weight:600}

/* progress bar */
.prog-wrap{margin-top:6px}
.prog-track{height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}
.prog-labels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.5rem;color:var(--t3);margin-top:3px}

/* category row */
.cat-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px}
.cat-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.88rem;flex-shrink:0}
.cat-info{flex:1;min-width:0}
.cat-name{font-size:.82rem;font-weight:600}
.cat-meta{font-family:var(--mono);font-size:.55rem;color:var(--t3);margin-top:1px}
.cat-amount{font-family:var(--mono);font-size:.8rem;font-weight:700;white-space:nowrap}

/* subscription */
.sub-item{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px;cursor:pointer;transition:all .12s}
.sub-item:hover{border-color:var(--b2)}
.sub-inactive{opacity:.4}
.sub-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* investment */
.inv-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);padding:14px;margin-bottom:8px}
.inv-projections{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:10px}
.inv-proj{background:var(--s2);border-radius:6px;padding:8px;text-align:center}
.inv-proj-val{font-family:var(--mono);font-size:.7rem;font-weight:700;color:var(--o)}
.inv-proj-lbl{font-family:var(--mono);font-size:.48rem;color:var(--t3);margin-top:2px}

/* budget */
.budget-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--rad);margin-bottom:4px}
.budget-over{border-color:var(--r) !important}

/* month nav */
.month-nav{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.month-nav-btn{width:28px;height:28px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s1);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:.8rem;transition:all .1s;flex-shrink:0}
.month-nav-btn:hover{border-color:var(--t3);color:var(--t1)}
.month-nav-btn:disabled{opacity:.3;cursor:default}
.month-lbl{font-family:var(--mono);font-size:.78rem;font-weight:600;flex:1;text-align:center;text-transform:capitalize}

/* toggle switch */
.tog{width:36px;height:20px;border-radius:10px;background:var(--b1);border:none;cursor:pointer;position:relative;transition:background .15s;flex-shrink:0}
.tog.on{background:var(--g)}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .15s}
.tog.on::after{transform:translateX(16px)}

/* empty state */
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:.8rem}
.empty-icon{font-size:2rem;margin-bottom:8px}

/* view animation */
.view-area{animation:viewIn .15s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);display:flex;align-items:flex-end;justify-content:center;z-index:100;animation:fi .1s}
@media(min-width:500px){.ov{align-items:center}}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
.mo{background:var(--s1);border:1px solid var(--b1);border-radius:14px 14px 0 0;padding:22px 18px 30px;width:100%;max-width:480px;animation:su .12s;max-height:92dvh;overflow-y:auto}
@media(min-width:500px){.mo{border-radius:10px}}
.mo h3{font-size:.92rem;font-weight:700;margin-bottom:16px}
.fg{margin-bottom:12px}
.fl{font-family:var(--mono);font-size:.64rem;text-transform:uppercase;letter-spacing:.5px;color:var(--t2);margin-bottom:5px;display:block}
.fi{width:100%;padding:9px 11px;border-radius:var(--rad);border:1px solid var(--b1);background:var(--s2);color:var(--t1);font-size:.84rem;outline:0;transition:border-color .12s}
.fi:focus{border-color:var(--g)}
textarea.fi{resize:vertical;min-height:60px;line-height:1.4}
.fi-row{display:flex;gap:8px}
.fi-row .fg{flex:1}
.fo{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:6px 11px;border-radius:var(--rad);border:1px solid var(--b1);background:0;font-size:.73rem;font-weight:500;cursor:pointer;transition:all .1s;color:var(--t2)}
.fb.on{border-color:var(--g);color:var(--g);background:var(--gd)}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:var(--rad);border:none;font-weight:600;font-size:.76rem;cursor:pointer;transition:all .1s}
.bp{background:var(--g);color:#111}.bp:hover{opacity:.85}
.bs{background:0;border:1px solid var(--b1);color:var(--t2)}.bs:hover{border-color:var(--t3)}
.bd{background:var(--rd);color:var(--r);border:1px solid var(--rd)}.bd:hover{opacity:.85}

/* type toggle in modal */
.type-tog{display:flex;gap:0;background:var(--s2);border-radius:var(--rad);padding:3px;margin-bottom:14px}
.type-btn{flex:1;padding:7px;border:none;border-radius:6px;font-family:var(--mono);font-size:.62rem;font-weight:600;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.4px;background:0;color:var(--t3)}
.type-btn.on{background:var(--s3);color:var(--t1)}

/* color picker */
.color-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.color-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .1s}
.color-dot.on,.color-dot:hover{border-color:var(--t1);transform:scale(1.15)}

/* filter bar */
.filter-bar{display:flex;gap:5px;margin-bottom:12px}
.filter-btn{flex:1;padding:6px;border-radius:var(--rad);border:1px solid var(--b1);background:0;font-family:var(--mono);font-size:.6rem;font-weight:600;cursor:pointer;color:var(--t3);transition:all .12s;text-align:center}
.filter-btn.on{border-color:var(--g);color:var(--g);background:var(--gd)}

@media(max-width:380px){.stat-val{font-size:.92rem}.inv-proj-val{font-size:.62rem}}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ═══════════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════════
const FB_CONFIG={apiKey:"AIzaSyBIL-pvTf4fvE-NuquiVXqkcedbXYssDL0",authDomain:"rotinavini.firebaseapp.com",databaseURL:"https://rotinavini-default-rtdb.firebaseio.com",projectId:"rotinavini",storageBucket:"rotinavini.firebasestorage.app",messagingSenderId:"926063710082",appId:"1:926063710082:web:892c51fef8d8c09c15099b"};
let dbRef=null, fbOk=false;

function initFB(){
  if(typeof firebase==='undefined') return;
  try{
    firebase.initializeApp(FB_CONFIG);
    dbRef=firebase.database().ref('financas');
    fbOk=true;
    dbRef.on('value', snap=>{
      const d=snap.val();
      if(d){
        S.transactions=d.transactions||S.transactions;
        S.categories=d.categories||S.categories;
        S.establishments=d.establishments||S.establishments;
        S.subscriptions=d.subscriptions||S.subscriptions;
        S.investments=d.investments||S.investments;
        S.investmentLogs=d.investmentLogs||S.investmentLogs;
        S.budgets=d.budgets||S.budgets;
        localStorage.setItem(LK, JSON.stringify(S));
        R();
      }
    });
  }catch(e){ console.error('Firebase:', e); }
}

// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const LK='finance_v1';
const COLORS=['#4ADE80','#60A5FA','#FBBF24','#F87171','#C084FC','#F472B6','#FB923C','#2DD4BF','#A78BFA','#FCD34D','#94A3B8','#34D399'];
const MNS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MNS_S=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

const DEF_CATS=[
  {id:'c1',name:'Alimentação',icon:'🍔',color:'#F87171'},
  {id:'c2',name:'Transporte',icon:'🚗',color:'#60A5FA'},
  {id:'c3',name:'Moradia',icon:'🏠',color:'#FBBF24'},
  {id:'c4',name:'Saúde',icon:'💊',color:'#4ADE80'},
  {id:'c5',name:'Lazer',icon:'🎮',color:'#C084FC'},
  {id:'c6',name:'Educação',icon:'📚',color:'#F472B6'},
  {id:'c7',name:'Assinaturas',icon:'🔄',color:'#FB923C'},
  {id:'c8',name:'Outros',icon:'📦',color:'#8A8A82'},
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let S = load();
let V = 'dash';
let currentMonth = today().slice(0,7);
let modal = null;

// modal state vars
let mTxType = 'expense';
let mNecessary = undefined;
let mSubBilling = 'monthly';
let mSubActive = true;
let mActionDone = false;
let txFilter = 'all';

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LK));
    if(d && (d.categories || d.transactions)){
      return {
        transactions: d.transactions||[],
        categories: d.categories||[...DEF_CATS],
        establishments: d.establishments||[],
        subscriptions: d.subscriptions||[],
        investments: d.investments||[],
        investmentLogs: d.investmentLogs||[],
        budgets: d.budgets||[],
      };
    }
  }catch(e){}
  return {
    transactions:[],
    categories:[...DEF_CATS],
    establishments:[],
    subscriptions:[],
    investments:[],
    investmentLogs:[],
    budgets:[],
  };
}

function save(){
  localStorage.setItem(LK, JSON.stringify(S));
  if(fbOk && dbRef){
    const clean=JSON.parse(JSON.stringify(S));
    dbRef.set(clean).catch(console.error);
  }
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function uid(){ return Math.random().toString(36).slice(2,9); }
function today(){ return new Date().toISOString().slice(0,10); }
function esc(s){ const d=document.createElement('div'); d.textContent=String(s||''); return d.innerHTML; }
function fmt(n){ return 'R$ '+Math.abs(+n||0).toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.'); }
function fmtS(n){ const v=Math.abs(+n||0); if(v>=1000) return 'R$ '+(v/1000).toFixed(1).replace('.',',')+'k'; return fmt(v); }
function monthName(ym){ const[y,m]=ym.split('-'); return MNS[+m-1]+' '+y; }
function monthShort(ym){ const[,m]=ym.split('-'); return MNS_S[+m-1]; }
function shiftMonth(ym,d){ const dt=new Date(ym+'-01'); dt.setMonth(dt.getMonth()+d); return dt.toISOString().slice(0,7); }
function getCat(id){ return S.categories.find(c=>c.id===id)||{id:'',name:'—',icon:'📦',color:'#555550'}; }
function getEst(id){ return S.establishments.find(e=>e.id===id)||{id:'',name:'—'}; }
function getInv(id){ return S.investments.find(i=>i.id===id); }
function getTx(id){ return S.transactions.find(t=>t.id===id); }
function getSub(id){ return S.subscriptions.find(s=>s.id===id); }

function monthTxs(ym){ return S.transactions.filter(t=>t.date.startsWith(ym)); }
function monthExpenses(ym){ return monthTxs(ym).filter(t=>t.type==='expense').reduce((s,t)=>s+(+t.amount||0),0); }
function monthIncome(ym){ return monthTxs(ym).filter(t=>t.type==='income').reduce((s,t)=>s+(+t.amount||0),0); }
function monthSubsCost(){ return S.subscriptions.filter(s=>s.active).reduce((sum,s)=>sum+(s.billing==='annual'?s.amount/12:s.amount),0); }
function invCurrent(inv){ return (+inv.initialAmount||0) + S.investmentLogs.filter(l=>l.investmentId===inv.id).reduce((s,l)=>s+(+l.amount||0),0); }

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function R(){
  document.getElementById('root').innerHTML = renderApp();
  // no extra binding needed — all via inline onclick
}

function renderApp(){
  return `<div class="app">
    ${renderHeader()}
    ${renderTabs()}
    <div class="view-area">${renderView()}</div>
  </div>${modal ? renderModal() : ''}`;
}

function renderHeader(){
  return `<div class="hdr">
    <div>
      <h1>💰 Finanças</h1>
      <div class="hdr-sub">${monthName(currentMonth)}</div>
    </div>
    <div class="hdr-r">
      <button class="btn-s btn-g" onclick="openModal('tx',null)">+ lançamento</button>
    </div>
  </div>`;
}

function renderTabs(){
  const tabs=[
    {id:'dash',label:'Visão Geral'},
    {id:'txs',label:'Lançamentos'},
    {id:'subs',label:'Assinaturas'},
    {id:'analysis',label:'Análises'},
    {id:'budget',label:'Orçamentos'},
    {id:'invest',label:'Investimentos'},
    {id:'config',label:'Config'},
  ];
  return `<div class="tabs">${tabs.map(t=>`<button class="tab${V===t.id?' on':''}" onclick="setView('${t.id}')">${t.label}</button>`).join('')}</div>`;
}

function renderView(){
  if(V==='dash') return renderDash();
  if(V==='txs') return renderTxs();
  if(V==='subs') return renderSubs();
  if(V==='analysis') return renderAnalysis();
  if(V==='budget') return renderBudget();
  if(V==='invest') return renderInvest();
  if(V==='config') return renderConfig();
  return '';
}

// ─── MONTH NAV ─────────────────────────────────────────────
function renderMonthNav(){
  const isCurrent = currentMonth === today().slice(0,7);
  return `<div class="month-nav">
    <button class="month-nav-btn" onclick="goMonth(-1)">‹</button>
    <div class="month-lbl">${monthName(currentMonth)}</div>
    <button class="month-nav-btn" onclick="goMonth(1)"${isCurrent?' disabled':''}>›</button>
  </div>`;
}

// ─── DASHBOARD ─────────────────────────────────────────────
function renderDash(){
  const exp = monthExpenses(currentMonth);
  const inc = monthIncome(currentMonth);
  const subs = monthSubsCost();
  const bal = inc - exp;
  const txs = monthTxs(currentMonth);

  // category breakdown
  const bycat = {};
  txs.filter(t=>t.type==='expense').forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+(+t.amount||0); });
  const topCats = Object.entries(bycat).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // actions needed
  const txActions = txs.filter(t=>t.actionNeeded&&!t.actionDone);
  const subActions = S.subscriptions.filter(s=>s.active&&s.actionNeeded&&!s.actionDone);

  // recent
  const recent = [...txs].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);

  return `
  ${renderMonthNav()}
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-val" style="color:var(--g)">${fmtS(inc)}</div>
      <div class="stat-lbl">Receitas</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--r)">${fmtS(exp)}</div>
      <div class="stat-lbl">Gastos</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:${bal>=0?'var(--g)':'var(--r)'}">${fmtS(bal)}</div>
      <div class="stat-lbl">Saldo</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" style="color:var(--o)">${fmtS(subs)}</div>
      <div class="stat-lbl">Assinaturas/mês</div>
    </div>
  </div>

  ${txActions.length||subActions.length ? `
  <div class="slbl" style="color:var(--o)">⚡ Ações Pendentes (${txActions.length+subActions.length})</div>
  ${txActions.map(t=>`

// ─── ANALYSIS ───────────────────────────────────────────────
function renderAnalysis(){
  const txs = monthTxs(currentMonth).filter(t=>t.type==='expense');
  const total = txs.reduce((s,t)=>s+(+t.amount||0),0);

  const bycat = {};
  txs.forEach(t=>{ bycat[t.category]=(bycat[t.category]||0)+(+t.amount||0); });
  const catEntries = Object.entries(bycat).sort((a,b)=>b[1]-a[1]);

  const byest = {};
  txs.forEach(t=>{ if(t.establishment){ byest[t.establishment]=(byest[t.establishment]||0)+(+t.amount||0); } });
  const estEntries = Object.entries(byest).sort((a,b)=>b[1]-a[1]).slice(0,8);

  const unnecessary = txs.filter(t=>t.necessary===false).reduce((s,t)=>s+(+t.amount||0),0);
  const necessary = total - unnecessary;

  // 6-month trend
  const months = [];
  for(let i=5;i>=0;i--){
    const dt=new Date(); dt.setDate(1); dt.setMonth(dt.getMonth()-i);
    const ym=dt.toISOString().slice(0,7);
    months.push({ym, exp:monthExpenses(ym), inc:monthIncome(ym)});
  }
  const maxVal = Math.max(...months.map(m=>Math.max(m.exp,m.inc)),1);

  return `
  ${renderMonthNav()}
  <div class="slbl">Gastos por Categoria</div>
  ${catEntries.length ? catEntries.map(([cid,amt])=>{
    const cat=getCat(cid);
    const pct=total>0?Math.min(Math.round(amt/total*100),100):0;
    return `<div class="cat-row">
      <div class="cat-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="cat-info">
        <div class="cat-name">${esc(cat.name)} <span style="font-family:var(--mono);font-size:.56rem;color:var(--t3)">${pct}%</span></div>
        <div class="prog-wrap">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${cat.color}"></div></div>
        </div>
      </div>
      <div class="cat-amount" style="color:${cat.color}">${fmt(amt)}</div>
    </div>`;
  }).join('') : `<div class="empty" style="padding:20px"><div class="empty-icon">📊</div>Sem dados</div>`}

  ${estEntries.length ? `
  <div class="slbl" style="margin-top:10px">Por Estabelecimento</div>
  ${estEntries.map(([eid,amt])=>{
    const est=getEst(eid);
    const pct=total>0?Math.min(Math.round(amt/total*100),100):0;
    return `<div class="cat-row">
      <div class="cat-icon" style="background:var(--s3)">🏪</div>
      <div class="cat-info">
        <div class="cat-name">${esc(est.name)}</div>
        <div class="prog-wrap">
          <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:var(--t2)"></div></div>
        </div>
      </div>
      <div class="cat-amount">${fmt(amt)}</div>
    </div>`;
  }).join('')}
  ` : ''}

  ${total > 0 ? `
  <div class="slbl" style="margin-top:10px">Necessário vs Desnecessário</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;font-family:var(--mono);font-size:.68rem;margin-bottom:6px">
      <span style="color:var(--g)">Necessário ${fmt(necessary)}</span>
      <span style="color:var(--r)">Desnecessário ${fmt(unnecessary)}</span>
    </div>
    <div class="prog-track" style="height:8px">
      <div class="prog-fill" style="width:${total>0?Math.round(necessary/total*100):100}%;background:var(--g)"></div>
    </div>
    <div style="font-family:var(--mono);font-size:.58rem;color:var(--t3);margin-top:5px;text-align:right">${total>0?Math.round(unnecessary/total*100):0}% desnecessário</div>
  </div>
  ` : ''}

  <div class="slbl" style="margin-top:10px">Últimos 6 Meses</div>
  <div class="card">
    <div style="display:flex;gap:6px;align-items:flex-end;height:90px">
      ${months.map(m=>`
        <div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:3px;height:100%">
          <div style="flex:1;width:100%;display:flex;align-items:flex-end;gap:2px">
            <div style="flex:1;background:var(--g);border-radius:3px 3px 0 0;height:${maxVal>0?Math.round(m.inc/maxVal*100):0}%;opacity:.8;min-height:${m.inc>0?3:0}px"></div>
            <div style="flex:1;background:var(--r);border-radius:3px 3px 0 0;height:${maxVal>0?Math.round(m.exp/maxVal*100):0}%;opacity:.9;min-height:${m.exp>0?3:0}px"></div>
          </div>
          <div style="font-family:var(--mono);font-size:.48rem;color:var(--t3)">${monthShort(m.ym)}</div>
        </div>
      `).join('')}
    </div>
    <div style="display:flex;gap:14px;justify-content:center;margin-top:8px">
      <div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.52rem;color:var(--t3)"><div style="width:9px;height:9px;border-radius:2px;background:var(--g);opacity:.8"></div>Receita</div>
      <div style="display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:.52rem;color:var(--t3)"><div style="width:9px;height:9px;border-radius:2px;background:var(--r);opacity:.9"></div>Gasto</div>
    </div>
  </div>
  `;
}

        <div class="prog-track">

        <div style="font-family:var(--mono);font-size:.5rem;color:var(--t3);margin-top:3px">${over?`R$ ${fmt(spent-b.amount).replace('R$ ','')} acima`:`${100-pct}% restante`}</div>

      <button class="btn-s" style="margin-left:8px;flex-shrink:0" onclick="openModal('budget',getBudget('${b.id}'))">✎</button>

  }).join('') : `<div class="empty"><div class="empty-icon">🎯</div>Nenhum orçamento para ${monthName(currentMonth)}</div>`}
  `;
}

// ═══════════════════════════════════════════════════════════
// ACTIONS — navigation
// ═══════════════════════════════════════════════════════════
function setView(v){ V=v; R(); }
function setTxFilter(f){ txFilter=f; R(); }
function goMonth(d){ currentMonth=shiftMonth(currentMonth,d); R(); }

// ─── modal open / close ─────────────────────────────────────
function openModal(type,data){
  modal = {type, data: data ? {...data} : null};
  mTxType = data?.type||'expense';
  mNecessary = data?.necessary;
  mSubBilling = data?.billing||'monthly';
  mSubActive = data?.active!==false;
  mActionDone = data?.actionDone||false;
  mBudgetType = data?.type||'category';
  R();
}

function closeModal(){ modal=null; R(); }

// ─── modal state setters (DOM-only, no full re-render) ───────
function setMTxType(t){
  mTxType=t;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.toggle('on',
    (t==='expense'&&b.textContent.includes('Gasto'))||(t==='income'&&b.textContent.includes('Receita'))
  ));
  const f=document.getElementById('m-expense-fields');
  if(f) f.style.display=t==='income'?'none':'';
}

function setMNecessary(v){
  mNecessary=v;
  document.querySelectorAll('#m-expense-fields .fb').forEach((b,i)=>b.classList.toggle('on',(i===0&&v===true)||(i===1&&v===false)));
}

function setMSubBilling(v){
  mSubBilling=v;
  document.querySelectorAll('#m-sub-billing .fb').forEach((b,i)=>b.classList.toggle('on',(i===0&&v==='monthly')||(i===1&&v==='annual')));
  // fallback: re-render relevant buttons
  document.querySelectorAll('.fo .fb').forEach(b=>{
    if(b.textContent.includes('Mensal')) b.classList.toggle('on',v==='monthly');
    if(b.textContent.includes('Anual')) b.classList.toggle('on',v==='annual');
  });
}

function toggleMSubActive(){
  mSubActive=!mSubActive;
  const b=document.querySelector('.tog[onclick="toggleMSubActive()"]');
  if(b) b.classList.toggle('on',mSubActive);
}

function toggleMActionDone(){
  mActionDone=!mActionDone;
  const b=document.getElementById('m-action-done');
  if(b) b.classList.toggle('on',mActionDone);
}

function selectColor(c){
  document.getElementById('m-color').value=c;
  document.querySelectorAll('.color-dot').forEach(d=>d.classList.toggle('on',d.style.background===c||d.style.backgroundColor===c));
}

let mBudgetType='category';
function setMBudgetType(t){
  mBudgetType=t;
  document.getElementById('m-btype-cat')?.classList.toggle('on',t==='category');
  document.getElementById('m-btype-est')?.classList.toggle('on',t==='establishment');
  const cw=document.getElementById('m-budget-cat-wrap');
  const ew=document.getElementById('m-budget-est-wrap');
  if(cw) cw.style.display=t==='establishment'?'none':'';
  if(ew) ew.style.display=t==='category'?'none':'';
}

// ═══════════════════════════════════════════════════════════
// ACTIONS — data mutations
// ═══════════════════════════════════════════════════════════
function saveTx(id){
  const desc = document.getElementById('m-desc')?.value?.trim();
  const amount = parseFloat(document.getElementById('m-amount')?.value);
  const date = document.getElementById('m-date')?.value;
  if(!desc||!amount||!date){ alert('Preencha descrição, valor e data.'); return; }
  const tx = {
    id: id||uid(),
    description: desc,
    amount: Math.abs(amount),
    date,
    type: mTxType,
    category: document.getElementById('m-cat')?.value||S.categories[0]?.id,
    establishment: document.getElementById('m-est')?.value||'',
    necessary: mTxType==='income' ? undefined : mNecessary,
    reason: document.getElementById('m-reason')?.value?.trim()||'',
    notes: document.getElementById('m-notes')?.value?.trim()||'',
    actionNeeded: document.getElementById('m-action')?.value?.trim()||'',
    actionDone: mActionDone,
  };
  if(id){ const i=S.transactions.findIndex(t=>t.id===id); if(i>=0) S.transactions[i]=tx; }
  else S.transactions.push(tx);
  save(); modal=null; R();
}

function deleteTx(id){
  if(!confirm('Excluir este lançamento?')) return;
  S.transactions=S.transactions.filter(t=>t.id!==id);
  save(); modal=null; R();
}

function saveSub(id){
  const name = document.getElementById('m-name')?.value?.trim();
  const amount = parseFloat(document.getElementById('m-amount')?.value);
  if(!name||!amount){ alert('Preencha nome e valor.'); return; }
  const sub = {
    id: id||uid(),
    name,
    amount: Math.abs(amount),
    billing: mSubBilling,
    category: document.getElementById('m-cat')?.value||S.categories[0]?.id,
    active: mSubActive,
    actionNeeded: document.getElementById('m-action')?.value?.trim()||'',
    actionDone: mActionDone,
    notes: document.getElementById('m-notes')?.value?.trim()||'',
  };
  if(id){ const i=S.subscriptions.findIndex(s=>s.id===id); if(i>=0) S.subscriptions[i]=sub; }
  else S.subscriptions.push(sub);
  save(); modal=null; R();
}

function deleteSub(id){
  if(!confirm('Excluir esta assinatura?')) return;
  S.subscriptions=S.subscriptions.filter(s=>s.id!==id);
  save(); modal=null; R();
}

function saveCat(id){
  const name = document.getElementById('m-name')?.value?.trim();
  const icon = document.getElementById('m-icon')?.value?.trim()||'📦';
  const color = document.getElementById('m-color')?.value||COLORS[0];
  if(!name){ alert('Preencha o nome.'); return; }
  const cat = {id:id||uid(), name, icon, color};
  if(id){ const i=S.categories.findIndex(c=>c.id===id); if(i>=0) S.categories[i]=cat; }
  else S.categories.push(cat);
  save(); modal=null; R();
}

function deleteCat(id){
  if(!confirm('Excluir esta categoria?')) return;
  S.categories=S.categories.filter(c=>c.id!==id);
  save(); modal=null; R();
}

function saveEst(id){
  const name = document.getElementById('m-name')?.value?.trim();
  if(!name){ alert('Preencha o nome.'); return; }
  const est = {id:id||uid(), name};
  if(id){ const i=S.establishments.findIndex(e=>e.id===id); if(i>=0) S.establishments[i]=est; }
  else S.establishments.push(est);
  save(); modal=null; R();
}

function deleteEst(id){
  if(!confirm('Excluir este estabelecimento?')) return;
  S.establishments=S.establishments.filter(e=>e.id!==id);
  save(); modal=null; R();
}

function saveBudget(id){
  const month = document.getElementById('m-month')?.value;
  const amount = parseFloat(document.getElementById('m-amount')?.value);
  if(!month||!amount){ alert('Preencha mês e valor.'); return; }
  const refId = mBudgetType==='category'
    ? document.getElementById('m-refid-cat')?.value
    : document.getElementById('m-refid-est')?.value;
  if(!refId){ alert('Selecione uma categoria ou estabelecimento.'); return; }
  const b = {id:id||uid(), month, type:mBudgetType, refId, amount};
  if(id){ const i=S.budgets.findIndex(b=>b.id===id); if(i>=0) S.budgets[i]=b; }
  else S.budgets.push(b);
  save(); modal=null; R();
}

function getBudget(id){ return S.budgets.find(b=>b.id===id); }

function deleteBudget(id){
  if(!confirm('Excluir este orçamento?')) return;
  S.budgets=S.budgets.filter(b=>b.id!==id);
  save(); modal=null; R();
}

function saveInvest(id){
  const name = document.getElementById('m-name')?.value?.trim();
  const goal = parseFloat(document.getElementById('m-goal')?.value)||0;
  const notes = document.getElementById('m-notes')?.value?.trim()||'';
  if(!name){ alert('Preencha o nome.'); return; }
  if(id){
    const i=S.investments.findIndex(inv=>inv.id===id);
    if(i>=0) S.investments[i]={...S.investments[i], name, goal, notes};
  } else {
    const initial = parseFloat(document.getElementById('m-initial')?.value)||0;
    S.investments.push({id:uid(), name, initialAmount:initial, goal, notes});
  }
  save(); modal=null; R();
}

function deleteInvest(id){
  if(!confirm('Excluir esta meta?')) return;
  S.investments=S.investments.filter(i=>i.id!==id);
  S.investmentLogs=S.investmentLogs.filter(l=>l.investmentId!==id);
  save(); modal=null; R();
}

function saveInvestLog(investmentId){
  const amount = parseFloat(document.getElementById('m-amount')?.value);
  const date = document.getElementById('m-date')?.value;
  const notes = document.getElementById('m-notes')?.value?.trim()||'';
  if(!amount||!date){ alert('Preencha valor e data.'); return; }
  S.investmentLogs.push({id:uid(), investmentId, amount, date, notes});
  save(); modal=null; R();
}

function exportData(){
  const blob = new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='financas_'+today()+'.json'; a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try{
      const d = JSON.parse(ev.target.result);
      if(d.transactions||d.categories){
        S = {...load(),...d};
        save(); R();
        alert('Dados importados com sucesso!');
      } else { alert('Arquivo inválido.'); }
    } catch { alert('Erro ao importar arquivo.'); }
  };
  reader.readAsText(file);
}
